<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DateFlo | Favorites</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400;1,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/cards.css">
  <link rel="stylesheet" href="css/forms.css">
  <link rel="stylesheet" href="css/plan-viewer.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <aside class="sidebar" id="sidebar"></aside>

  <main class="main-content">
    <div class="page-header">
      <p class="section-label">Favorites</p>
      <h1 class="page-title">Saved Venues</h1>
      <p class="page-sub">Your favorite spots for future dates.</p>
    </div>

    <div class="fav-grid stagger" id="favGrid">
      <!-- Favorite cards injected here -->
    </div>

    <div id="emptyFavs" class="empty-state hidden">
      <div class="empty-icon">⭐</div>
      <h3>No favorites yet</h3>
      <p>Save your favorite restaurants, bars, and spots for future date plans.</p>
      <button class="btn-primary" id="addFavBtn">Add a Venue</button>
    </div>
  </main>

  <!-- Add Venue Floating Button -->
  <div style="position:fixed;bottom:24px;right:24px;z-index:20" id="fabWrap">
    <button class="btn-primary" id="openAddModal" style="border-radius:50px;padding:14px 28px;box-shadow:0 8px 24px rgba(224,87,128,.3)">&#43; Add Venue</button>
  </div>

  <!-- Add/Edit Venue Modal -->
  <div class="modal-overlay" id="favModal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="favModalTitle">Add a Venue</h3>
        <button class="modal-close" id="closeFavModal">&times;</button>
      </div>

      <!-- Step 1: Name and Type -->
      <div class="form-group">
        <label>Venue Name <span class="req">*</span></label>
        <input type="text" class="form-input" id="favName" placeholder="e.g. Olive Garden, The Rooftop Bar">
      </div>
      <div class="form-group">
        <label>Type</label>
        <select class="form-input" id="favType">
          <option value="restaurant">Restaurant</option>
          <option value="bar">Bar / Lounge</option>
          <option value="cafe">Cafe / Coffee Shop</option>
          <option value="activity">Activity / Experience</option>
          <option value="park">Park / Outdoor</option>
          <option value="other">Other</option>
        </select>
      </div>

      <!-- Location toggle -->
      <div class="form-group">
        <label>Location</label>
        <div style="display:flex;gap:8px;margin-bottom:12px">
          <button class="chip active" id="locMyCity" type="button">In my city</button>
          <button class="chip" id="locOther" type="button">Different city</button>
        </div>
        <div id="otherCityFields" class="hidden">
          <input type="text" class="form-input" id="favCity" placeholder="City, State (e.g. Miami, FL)" style="margin-bottom:12px">
        </div>
        <div id="myCityLabel" class="form-hint" style="font-style:normal;color:var(--text-muted)">
          We'll use the city from your preferences.
        </div>
      </div>

      <!-- Notes (optional) -->
      <div class="form-group">
        <label>Notes (optional)</label>
        <input type="text" class="form-input" id="favNotes" placeholder="Great pasta, rooftop seating, reservations needed...">
      </div>

      <div class="modal-actions">
        <button class="btn-ghost btn-small" id="cancelFavBtn">Cancel</button>
        <button class="btn-primary btn-small" id="saveFavBtn">Save Venue</button>
      </div>
    </div>
  </div>

  <div class="mobile-tabs" id="mobileTabs"></div>

  <script type="module" src="js/favorites.js"></script>
</body>
</html>
