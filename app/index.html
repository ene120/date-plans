<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DateFlo | Sign Up or Sign In</title>
  <meta name="description" content="Sign in to your DateFlo dashboard. View your date plans, edit preferences, and plan your next date.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400;1,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/forms.css">
  <style>
    .login-page{
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      background:var(--bg-base);
      padding:clamp(20px,4vw,40px);position:relative;overflow:hidden;
    }
    .login-page::before{
      content:'';position:absolute;top:-25%;right:-15%;width:600px;height:600px;
      background:radial-gradient(circle,rgba(224,87,128,.05) 0%,transparent 70%);
      pointer-events:none;animation:floatGlow 10s ease-in-out infinite;
    }
    .login-page::after{
      content:'';position:absolute;bottom:-25%;left:-10%;width:400px;height:400px;
      background:radial-gradient(circle,rgba(142,58,89,.04) 0%,transparent 70%);
      pointer-events:none;animation:floatGlow 12s ease-in-out infinite reverse;
    }
    @keyframes floatGlow{
      0%,100%{transform:translate(0,0) scale(1);opacity:.5}
      50%{transform:translate(15px,10px) scale(1.08);opacity:1}
    }
    .login-card{
      background:var(--bg-surface);border:1px solid var(--border-subtle);
      border-radius:var(--radius-xl);padding:clamp(32px,5vw,48px);
      max-width:420px;width:100%;
      position:relative;z-index:1;text-align:center;
      box-shadow:0 16px 48px rgba(0,0,0,.35);
    }
    .login-logo{
      font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:800;
      margin-bottom:4px;
      background:linear-gradient(135deg,#e05780,#f9ca24);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;
    }
    .login-tagline{color:var(--text-muted);font-size:.82rem;margin-bottom:32px}
    .login-title{
      font-family:'Playfair Display',serif;font-size:clamp(1.4rem,3vw,1.8rem);
      font-weight:700;margin-bottom:6px;letter-spacing:-.01em;
    }
    .login-sub{color:var(--text-soft);font-size:.88rem;margin-bottom:28px;line-height:1.7}
    .login-form{text-align:left}
    .login-btn{width:100%;justify-content:center;margin-top:6px;padding:14px}
    .login-divider{
      display:flex;align-items:center;gap:14px;margin:24px 0;
      color:var(--text-muted);font-size:.78rem;
    }
    .login-divider::before,.login-divider::after{
      content:'';flex:1;height:1px;background:var(--border-subtle);
    }
    .invite-toggle{
      color:var(--text-muted);font-size:.84rem;cursor:pointer;
      transition:color .15s;background:none;border:none;
      text-decoration:underline;text-underline-offset:3px;
    }
    .invite-toggle:hover{color:var(--rose)}
    .invite-section{display:none;margin-top:18px;text-align:left}
    .invite-section.open{display:block;animation:fadeIn .3s ease}
    .login-footer{
      margin-top:28px;padding-top:20px;border-top:1px solid var(--border-subtle);
      font-size:.8rem;color:var(--text-muted);
    }
    .login-footer a{color:var(--rose);text-decoration:underline;text-underline-offset:3px;transition:color .15s}
    .login-footer a:hover{color:var(--rose-light)}

    .email-sent{display:none;text-align:center}
    .email-sent.show{display:block;animation:fadeIn .4s ease}
    .email-sent .sent-icon{
      font-size:2rem;margin-bottom:16px;
      width:60px;height:60px;border-radius:50%;
      background:rgba(0,184,148,.06);border:1px solid rgba(0,184,148,.1);
      display:inline-flex;align-items:center;justify-content:center;
    }
    .email-sent h2{font-family:'Playfair Display',serif;font-size:1.5rem;margin-bottom:8px}
    .email-sent p{color:var(--text-soft);font-size:.88rem;line-height:1.7}
    .email-sent .email-highlight{color:var(--rose);font-weight:600}
    .email-resend{
      margin-top:20px;color:var(--text-muted);font-size:.8rem;
      background:none;border:none;cursor:pointer;text-decoration:underline;
      text-underline-offset:3px;transition:color .15s;
    }
    .email-resend:hover{color:var(--rose)}
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">DateFlo</div>
      <div class="login-tagline">Your date planning dashboard</div>

      <div id="loginForm">
        <div class="login-title">Sign Up or Sign In</div>
        <p class="login-sub">Enter your email and we'll send you a magic link. No password needed.</p>

        <div class="login-form">
          <div class="form-group">
            <label>Email Address <span class="req">*</span></label>
            <input type="email" class="form-input" id="emailInput" placeholder="you@example.com" required autofocus>
          </div>
          <button class="btn-primary login-btn" id="sendLinkBtn" onclick="handleSendLink()">
            Continue &rarr;
          </button>
        </div>

        <div class="login-divider">or</div>

        <button class="invite-toggle" onclick="toggleInvite()">Have an invite code?</button>
        <div class="invite-section" id="inviteSection">
          <div class="form-group">
            <label>Invite Code</label>
            <input type="text" class="form-input" id="inviteCodeInput" placeholder="Enter your 12 character code">
          </div>
          <button class="btn-ghost btn-small" style="width:100%;justify-content:center" onclick="handleInviteCode()">
            Join with Code
          </button>
        </div>

        <div class="login-footer">
          New here? <a href="https://dateflo.com" target="_blank">Get a date plan at dateflo.com</a>
        </div>
      </div>

      <div class="email-sent" id="emailSent">
        <div class="sent-icon">✉️</div>
        <h2>Check Your Email</h2>
        <p>We sent a magic link to<br><span class="email-highlight" id="sentEmailDisplay"></span></p>
        <p style="margin-top:10px;font-size:.82rem;color:var(--text-muted)">Click the link in the email to sign in. It may take a minute to arrive.</p>
        <button class="email-resend" onclick="handleResend()">Didn't get it? Resend</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { getSession, sendMagicLink } from './js/auth.js';

    const session = await getSession();
    if (session) {
      // If they have a pending request from guest flow, go to request page
      const pendingRequest = localStorage.getItem('dateflo_pending_request');
      if (pendingRequest) {
        window.location.href = './request.html';
      } else {
        window.location.href = './dashboard.html';
      }
    }

    const storedCode = localStorage.getItem('dateflo_invite_code');
    if (storedCode && session) {
      window.location.href = './dashboard.html';
    }

    // Rate limit tracking
    let lastSendTime = 0;
    const SEND_COOLDOWN = 60000; // 60 seconds between sends

    function friendlyError(msg) {
      if (!msg) return 'Something went wrong. Please try again.';
      const lower = msg.toLowerCase();
      if (lower.includes('rate limit') || lower.includes('too many')) {
        return 'Too many requests. Please wait a minute before trying again.';
      }
      if (lower.includes('invalid email') || lower.includes('invalid')) {
        return 'Please enter a valid email address.';
      }
      return 'Something went wrong. Please try again in a moment.';
    }

    window.handleSendLink = async function() {
      const email = document.getElementById('emailInput').value.trim();
      if (!email) { alert('Please enter your email address.'); return; }

      // Client side cooldown
      const now = Date.now();
      if (now - lastSendTime < SEND_COOLDOWN) {
        const wait = Math.ceil((SEND_COOLDOWN - (now - lastSendTime)) / 1000);
        alert('Please wait ' + wait + ' seconds before requesting another link.');
        return;
      }

      const btn = document.getElementById('sendLinkBtn');
      btn.disabled = true;
      btn.textContent = 'Sending...';

      const { error } = await sendMagicLink(email);

      if (error) {
        alert(friendlyError(error.message));
        btn.disabled = false;
        btn.innerHTML = 'Continue &rarr;';
        return;
      }

      lastSendTime = Date.now();
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('emailSent').classList.add('show');
      document.getElementById('sentEmailDisplay').textContent = email;
      window._lastEmail = email;
    };

    window.handleResend = async function() {
      if (!window._lastEmail) return;

      const now = Date.now();
      if (now - lastSendTime < SEND_COOLDOWN) {
        const wait = Math.ceil((SEND_COOLDOWN - (now - lastSendTime)) / 1000);
        const btn = document.querySelector('.email-resend');
        btn.textContent = 'Please wait ' + wait + 's';
        setTimeout(() => { btn.textContent = "Didn't get it? Resend"; }, 3000);
        return;
      }

      const { error } = await sendMagicLink(window._lastEmail);
      const btn = document.querySelector('.email-resend');

      if (error) {
        btn.textContent = friendlyError(error.message);
        setTimeout(() => { btn.textContent = "Didn't get it? Resend"; }, 4000);
        return;
      }

      lastSendTime = Date.now();
      btn.textContent = 'Sent! Check your inbox.';
      setTimeout(() => { btn.textContent = "Didn't get it? Resend"; }, 3000);
    };

    window.toggleInvite = function() {
      document.getElementById('inviteSection').classList.toggle('open');
    };

    window.handleInviteCode = function() {
      const code = document.getElementById('inviteCodeInput').value.trim();
      if (!code) { alert('Please enter an invite code.'); return; }
      localStorage.setItem('dateflo_invite_code', code);
      document.getElementById('inviteSection').style.display = 'none';
      document.querySelector('.invite-toggle').style.display = 'none';
      document.querySelector('.login-sub').textContent = 'Great! Enter your email to sign in and join your partner.';
    };

    document.getElementById('emailInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') window.handleSendLink();
    });
  </script>
</body>
</html>
